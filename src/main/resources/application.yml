spring:
  application:
    name: loan-wallet-system

  datasource:
    url: jdbc:postgresql://localhost:5432/loan_wallet_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

jwt:
  secret: 1234567890123456789012345678901234567890123456789012345678901234
  expiration: 86400000

app:
  otp:
    expiry-minutes: 10
    resend-limit-minutes: 2
  payment:
    webhook-secret: test_webhook_secret
  default-currency: NGN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: INFO
    com.koins.loanwallet: DEBUG
    org.hibernate.SQL: DEBUG